name: Java CI with Maven Matrix and JaCoCo

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest] # Chạy trên 3 hệ điều hành cùng lúc

    runs-on: ${{ matrix.os }}
    # Cấp quyền để Bot có thể viết bình luận vào Pull Request
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: 'Bai3/pom.xml'

      - name: Build with Maven and Check Coverage
        # Lệnh verify sẽ kích hoạt JaCoCo check mức 80% như đã cấu hình trong pom.xml
        run: mvn -B verify --file Bai3/pom.xml

      - name: Upload JaCoCo Report
        # Chỉ cần upload report từ một máy (thường là ubuntu) để tránh trùng lặp, hoặc upload cả 3
        if: always() # Luôn chạy bước này kể cả khi test fail để bạn xem report lỗi ở đâu
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          path: Bai3/target/site/jacoco/
      - name: Run Checkstyle and Review
        # Dòng này giúp bỏ qua lỗi trên Mac/Windows và chỉ chạy trên Ubuntu
        if: matrix.os == 'ubuntu-latest'
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          level: warning # Bot sẽ cảnh báo nếu code xấu
          fail_on_error: false # dòng này để nếu có lỗi nó vẫn đẩy lên được
          workdir: Bai3
